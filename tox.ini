[tox]
envlist =
    py310-django42-drf316
    py311-django42-drf316
    py312-django52-drf316
    py313-django60-drf317
isolated_build = true
skip_missing_interpreters = true

[testenv]
deps =
    coverage>=7.6
    django42: Django>=4.2,<4.3
    django52: Django>=5.2,<5.3
    django60: Django>=6.0,<6.1
    drf316: djangorestframework>=3.16,<3.17
    drf317: djangorestframework>=3.17,<3.18
commands =
    python -m django test tests --settings=tests.test_settings --verbosity=1

[testenv:coverage]
deps =
    coverage>=7.6
    Django>=6.0,<6.1
    djangorestframework>=3.17,<3.18
commands =
    coverage run --source=drf_api_logger -m django test tests --settings=tests.test_settings --verbosity=1
    coverage report
