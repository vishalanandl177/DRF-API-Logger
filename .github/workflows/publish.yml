name: Test, build, and publish package

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.django-label }} / ${{ matrix.drf-label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            django-label: "Django 4.2"
            django-package: "Django>=4.2,<4.3"
            drf-label: "DRF 3.16"
            drf-package: "djangorestframework>=3.16,<3.17"
          - python-version: "3.11"
            django-label: "Django 4.2"
            django-package: "Django>=4.2,<4.3"
            drf-label: "DRF 3.16"
            drf-package: "djangorestframework>=3.16,<3.17"
          - python-version: "3.12"
            django-label: "Django 5.2"
            django-package: "Django>=5.2,<5.3"
            drf-label: "DRF 3.16"
            drf-package: "djangorestframework>=3.16,<3.17"
          - python-version: "3.13"
            django-label: "Django 6.0"
            django-package: "Django>=6.0,<6.1"
            drf-label: "DRF 3.17"
            drf-package: "djangorestframework>=3.17,<3.18"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ matrix.django-package }}" "${{ matrix.drf-package }}"
          python -m pip install -e .

      - name: Run full test suite
        run: python -m django test tests --settings=tests.test_settings --verbosity=1

  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build twine

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Ensure wheel and source distribution exist
        run: |
          shopt -s nullglob
          wheel_files=(dist/*.whl)
          sdist_files=(dist/*.tar.gz)

          if [ ${#wheel_files[@]} -eq 0 ]; then
            echo "Wheel artifact is missing from dist/." >&2
            exit 1
          fi

          if [ ${#sdist_files[@]} -eq 0 ]; then
            echo "Source distribution artifact is missing from dist/." >&2
            exit 1
          fi

          printf 'Wheel artifacts:\n'
          printf '%s\n' "${wheel_files[@]}"
          printf 'Source distribution artifacts:\n'
          printf '%s\n' "${sdist_files[@]}"

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: pypi

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install metadata tooling
        run: python -m pip install --upgrade setuptools

      - name: Read package metadata
        id: package
        run: |
          package_name="$(python setup.py --name)"
          package_version="$(python setup.py --version)"
          if [ -z "$package_name" ] || [ -z "$package_version" ]; then
            echo "Could not read package name/version from setup.py" >&2
            exit 1
          fi
          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "Package: $package_name $package_version"

      - name: Check whether package version exists on PyPI
        id: pypi_version
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import urllib.error
          import urllib.request

          def write_output(name, value):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write(f"{name}={value}\n")

          def write_summary(message):
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
              if summary_path:
                  with open(summary_path, "a", encoding="utf-8") as summary:
                      summary.write(f"{message}\n")

          package_name = re.sub(r"[-_.]+", "-", os.environ["PACKAGE_NAME"]).lower()
          package_version = os.environ["PACKAGE_VERSION"]
          if not package_name or not package_version:
              raise SystemExit("PACKAGE_NAME and PACKAGE_VERSION must not be empty.")
          url = f"https://pypi.org/pypi/{package_name}/{package_version}/json"
          print(f"Checking {url}")

          try:
              with urllib.request.urlopen(url, timeout=15):
                  pass
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"{package_name} {package_version} is not on PyPI yet.")
                  write_output("exists", "false")
                  write_summary(
                      f"{package_name} {package_version} is not on PyPI yet. Publishing will continue."
                  )
                  sys.exit(0)
              raise

          print(
              f"{package_name} {package_version} already exists on PyPI. "
              "Skipping publish and GitHub release steps."
          )
          write_output("exists", "true")
          write_summary(
              f"{package_name} {package_version} already exists on PyPI. "
              "Publish and GitHub release steps were skipped."
          )
          PY

      - name: Skip publish because package version already exists
        if: steps.pypi_version.outputs.exists == 'true'
        run: |
          echo "${{ steps.package.outputs.name }} ${{ steps.package.outputs.version }} already exists on PyPI."
          echo "Publishing and GitHub release creation were skipped."

      - name: Download package artifacts
        if: steps.pypi_version.outputs.exists != 'true'
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist

      - name: Ensure downloaded wheel and source distribution exist
        if: steps.pypi_version.outputs.exists != 'true'
        run: |
          shopt -s nullglob
          wheel_files=(dist/*.whl)
          sdist_files=(dist/*.tar.gz)

          if [ ${#wheel_files[@]} -eq 0 ]; then
            echo "Wheel artifact is missing from downloaded dist/." >&2
            exit 1
          fi

          if [ ${#sdist_files[@]} -eq 0 ]; then
            echo "Source distribution artifact is missing from downloaded dist/." >&2
            exit 1
          fi

          printf 'Publishing wheel artifacts:\n'
          printf '%s\n' "${wheel_files[@]}"
          printf 'Source distribution artifacts:\n'
          printf '%s\n' "${sdist_files[@]}"

      - name: Publish package distributions to PyPI
        if: steps.pypi_version.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        if: steps.pypi_version.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh release create "$PACKAGE_VERSION" dist/* \
            --target "$GITHUB_SHA" \
            --title "$PACKAGE_NAME $PACKAGE_VERSION" \
            --generate-notes
