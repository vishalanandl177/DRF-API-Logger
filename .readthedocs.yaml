# .readthedocs.yaml
# Read the Docs configuration file.
# See https://docs.readthedocs.com/platform/stable/config-file/v2.html for details.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

formats:
  - pdf

python:
  install:
    - requirements: ./docs/requirements.txt
    - method: pip
      path: .
